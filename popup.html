<!DOCTYPE html>
<html>
<head>
<style>
    body {
      width: 300px;
      height: 200px;
      font-family: Arial, sans-serif;
    }
    #note-area {
      height: 150px;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 16px;
    }
    .note-item {
      color: green;
      margin: 5px 0;
      cursor: pointer;
    }
</style>
</head>
<body>
  <h3>NoteTaker</h3>
  <input type="text" id="note-input" placeholder="Enter note...">
  <button id="save-btn">Save</button>
  <ul id="notes-list"></ul>
  <script src="script.js" defer></script>
</body>
</html>
